<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gráfico de Puntos en Movimiento</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    canvas {
      border: 1px solid black;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Gráfico de Puntos en Movimiento</h1>

  <canvas id="lienzo" width="500" height="300"></canvas>

  <script>
    const canvas = document.getElementById("lienzo");
    const ctx = canvas.getContext("2d");

    // Crear puntos iniciales
    let puntos = [];

    function crearPuntos() {
      for (let i = 0; i < 5; i++) {
        puntos.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height
        });
      }
    }

    // Dibujar puntos
    function dibujarPuntos() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // limpiar

      puntos.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = "blue";
        ctx.fill();
      });
    }

    // Actualizar posiciones
    function moverPuntos() {
      puntos.forEach(p => {
        p.x += (Math.random() - 0.5) * 50;
        p.y += (Math.random() - 0.5) * 50;

        // Evitar que salgan del canvas
        p.x = Math.max(0, Math.min(canvas.width, p.x));
        p.y = Math.max(0, Math.min(canvas.height, p.y));
      });
    }

    // Loop
    function actualizar() {
      moverPuntos();
      dibujarPuntos();
    }

    crearPuntos();
    dibujarPuntos();

    setInterval(actualizar, 1000);
  </script>

</body>
</html>
