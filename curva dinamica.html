<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Curva Dinámica Coseno</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    canvas {
      border: 1px solid black;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Curva Dinámica de y = cos(x)</h1>

  <canvas id="lienzo" width="600" height="300"></canvas>

  <script>
    const canvas = document.getElementById("lienzo");
    const ctx = canvas.getContext("2d");

    let desplazamiento = 0; // esto hará que la curva "se mueva"

    function dibujarCurva() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.beginPath();

      for (let x = 0; x < canvas.width; x++) {
        let escalaX = x * 0.02;
        let y = Math.cos(escalaX + desplazamiento);

        // escalar al canvas
        let posY = canvas.height / 2 + y * 80;

        if (x === 0) {
          ctx.moveTo(x, posY);
        } else {
          ctx.lineTo(x, posY);
        }
      }

      ctx.strokeStyle = "blue";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function actualizar() {
      desplazamiento += 0.2; // mueve la onda
      dibujarCurva();
    }

    // iniciar
    dibujarCurva();
    setInterval(actualizar, 100);
  </script>

</body>
</html>
